<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handwriting Teacher</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/style.css" />
</head>

<body>
    <header>
        <h1>HANDWRITING TEACHER</h1>
    </header>
    <nav>
        <a href="/static/instructions.html">Instructions</a>
        <a href="/static/about.html">About</a>
        <a href="https://github.com/arcturus3/handwriting-teacher" target="_blank" rel="noopener noreferrer" class="github-link">
            <svg height="18" width="18" viewBox="0 0 16 16" fill="currentColor" style="vertical-align: middle; margin-right: 4px;">
                <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
            </svg>GitHub
        </a>
    </nav>
    <div class="pageLayout">
        <div class="left">
            <h3>Write the Following: <em id="sample"> </em></h3>
            <div id="canvasHolder"></div>
            <div class="buttonHolder">
                <button id="uploadButton" class="inputButton" type="submit" onclick="uploadImage()">Upload .jpg</button>
                <button type="submit" class="inputButton" onclick="submit()">Submit</button>
            </div>
            <input id="fileInput" type="file" accept=".jpg, .jpeg" style="display: none;">


            <!-- Here is where we update the user on the process -->
            <h4 id="statusLine" style="display: none;">Status: <span id="statusText"></span></h4>
            <p id = "feedbackText">Make sure you dot your i's and cross your t's!!!</p>
            <p>For best results, use a stylus or pen tablet. No stylus? Write on paper and upload a photo.</p>
        </div>
        <div class="right">
            <div class="language-selector">
                <button class="lang-btn" data-lang="en">English</button>
                <button class="lang-btn" data-lang="ru">Русский</button>
                <button class="lang-btn" data-lang="ar">العربية</button>
            </div>
            <h2>Character Mastery</h2>
            <div class="alphabet-container" id="alphabet-grid">
                <!-- JavaScript will insert grid items here -->
            </div>
            <!-- Add more image-box divs as needed -->
        </div>
    </div>
    <!-- Add your HTML content here -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="/static/createGrid.js"></script>
    <script src="/static/main.js"></script>
</body>

</html>
